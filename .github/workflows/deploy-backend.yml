name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: # Allow manual triggering

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax
        run: |
          pip install flake8
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Triggering Render deploy via deploy hook..."
          HOOK="${RENDER_DEPLOY_HOOK:-https://api.render.com/deploy/srv-d79547450q8c73fc78p0?key=XmaLT81Svl4}"
          HTTP_CODE=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" \
            -X POST "$HOOK")
          cat /tmp/render_response.txt
          echo ""
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Render deploy hook returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deploy triggered successfully (HTTP $HTTP_CODE)"

      - name: Wait for deployment to go live
        run: |
          HEALTH_URL="https://convoflow-api.onrender.com/health"
          echo "Waiting for Render to build and deploy (free tier can take 5-10 min)..."

          # Get the expected version from the commit
          for attempt in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$HEALTH_URL" --max-time 10)
            if [ "$HTTP_CODE" = "200" ]; then
              VERSION=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','?'))" 2>/dev/null || echo "?")
              echo "  Attempt $attempt: HTTP 200, version=$VERSION"
              # After 3 consecutive 200s, consider it deployed
              if [ "$attempt" -gt 3 ]; then
                echo "✅ Backend is live!"
                cat /tmp/health.json
                exit 0
              fi
            else
              echo "  Attempt $attempt: HTTP $HTTP_CODE (building...)"
            fi
            sleep 10
          done
          echo "::warning::Deployment health check timed out after 10 minutes"
          # Don't fail - free tier can be slow
          exit 0

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify critical endpoints
        run: |
          BASE="https://convoflow-api.onrender.com"

          # Health check
          echo "Checking /health..."
          curl -sf "$BASE/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  Status: {d[\"status\"]}, Version: {d[\"version\"]}')"

          # Auth endpoint exists (should return 422 for missing body)
          echo "Checking /auth/login..."
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$BASE/auth/login")
          if [ "$HTTP" = "422" ]; then
            echo "  ✅ Auth endpoint responding (422 = validation error, expected)"
          else
            echo "  ⚠️ Auth returned HTTP $HTTP"
          fi

          # Protected endpoint returns 401 without token
          echo "Checking /leads requires auth..."
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/leads")
          if [ "$HTTP" = "401" ]; then
            echo "  ✅ /leads properly protected (401)"
          else
            echo "  ❌ /leads returned HTTP $HTTP — should be 401!"
            exit 1
          fi

          # Agents endpoint requires auth
          echo "Checking /agents requires auth..."
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/agents/")
          if [ "$HTTP" = "401" ]; then
            echo "  ✅ /agents properly protected (401)"
          else
            echo "  ❌ /agents returned HTTP $HTTP — should be 401!"
            exit 1
          fi

          echo ""
          echo "🎉 All smoke tests passed!"
