name: Deploy Web to Vercel

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Type check
        run: cd web && npx tsc --noEmit

      - name: Build
        run: cd web && npm run build
        env:
          VITE_API_URL: https://convoflow-api.onrender.com

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_5DFCjy6cGDgOt6V3nqdFLtDI
          VERCEL_PROJECT_ID: prj_cI6ARP2Os2995N9YgjNXPJNVw5BA
        run: cd web && npx vercel --prod --yes --token "$VERCEL_TOKEN"

  smoke-test:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verify web dashboard
        run: |
          echo "Checking web dashboard..."
          for attempt in $(seq 1 6); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://convoflow-web.vercel.app" --max-time 10)
            if [ "$HTTP" = "200" ]; then
              echo "✅ Web dashboard responding (HTTP 200)"
              exit 0
            fi
            echo "  Attempt $attempt: HTTP $HTTP, retrying..."
            sleep 5
          done
          echo "::warning::Web dashboard not responding"
